wire-runtime = { module = "com.squareup.wire:wire-runtime", version.ref = "wireRuntime" }


[plugins]
#agp
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidMultiplatformLibrary = { id = "com.android.kotlin.multiplatform.library", version.ref = "agp" }
# compose
composeHotReload = { id = "org.jetbrains.compose.hot-reload", version.ref = "composeHotReload" }
composeMultiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
#kotlin
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlinx-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
jetbrains-kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
wire-plugin = { id = "com.squareup.wire", version.ref = "wireRuntime" }
#others
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
androidx-room = { id = "androidx.room", version.ref = "room" }
build-konfig = { id = "com.codingfeline.buildkonfig", version.ref = "build-konfig" }
koin-compiler = { id = "io.insert-koin.compiler.plugin", version.ref = "koin-plugin" }
# nucleus
nucleus-framework = { id = "dev.nucleusframework", version.ref = "nucleus" }
nucleus-nna = { id = "dev.nucleusframework.nna", version.ref = "nucleusnativeaccess" }
# quality of life
lighthouse = { id = "io.github.dev-vikas-soni.lighthouse", version.ref = "lighthouse" }
catelog-update = { id = "nl.littlerobots.version-catalog-update", version.ref = "catelog-update" }
#custom plugins
nucleus-nna-cmake-ext = { id = "com.sam.bluepad.nucleus.nna.cmakeExt", version = "unspecified" }
nucleus-build-ext = { id = "com.sam.bluepad.nucleus.buildExt", version = "unspecified" }


[bundles]
testing-unit = ["kotlin-test", "kotlin-testJunit", "junit", "assertk", "turbine", "kotlinx-coroutines-test"]
testing-android = ["androidx-testExt-junit", "androidx-espresso-core"]
compose-ui = ["cmp-runtime", "cmp-foundation", "cmp-ui", "cmp-material3", "cmp-components-resources", "androidx-lifecycle-viewmodelCompose", "androidx-lifecycle-runtimeCompose"]
compose-navigation3 = ["jetbrains-lifecycle-viewmodelNavigation3", "jetbrains-material3-adaptiveNavigation3", "jetbrains-navigation3-ui"]
koin-common = ["koin-core", "koin-viewmodel", "koin-compose", "koin-compose-viewmodel"]
koin-android = ["koin-android", "koin-android-startup"]
room = ["androidx-room-runtime", "androidx-sqlite-bundled"]
datastore = ["androidx-datastore", "androidx-datastore-preferences", "androidx-datastore-core-okio"]
crypto = ["kotlin-crypto-sha2", "kotlin-crypto-random", "whyoleg-cryptography-core", "whyoleg-cryptography-provider-optimal"]
kable = ["kable-core", "kable-exceptions"]
kotlinx-common = ["kotlinx-coroutines-core", "kotlinx-datetime", "kotlinx-collections-immutable", "kotlinx-serialization-core", "kotlinx-io-core"]
nucleus = ["nucleus-core-application", "nucleus-decorated-window-tao", "nucleus-decorated-window-material3"]
