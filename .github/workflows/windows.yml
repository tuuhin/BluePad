name: Build and Test Windows Pipeline

on:
    release:
        types: [ created ]
    workflow_dispatch:

jobs:
    build-windows:
        name: Build & Test Windows Target
        runs-on: windows-2022

        env:
            CI: "true"
            NATIVE_BUILD_TYPE_RELEASE: "true"

        steps:
            -   name: Checkout Code
                uses: actions/checkout@v4

            -   name: Setup Java
                uses: actions/setup-java@v4
                with:
                    java-version: "22"
                    distribution: "liberica"
                    cache: gradle

            -   name: Ensure ImageMagick is Installed
                shell: pwsh
                run: |
                    if (Get-Command magick -ErrorAction SilentlyContinue) {
                      Write-Host "ImageMagick is already installed."
                      magick -version
                    } else {
                      Write-Host "ImageMagick not found. Installing via Chocolatey..."
                      choco install imagemagick -y

                      # Refresh PATH for current session
                      $env:Path += ";C:\Program Files\ImageMagick-*"

                      if (Get-Command magick -ErrorAction SilentlyContinue) {
                        Write-Host "ImageMagick installed successfully."
                        magick -version
                      } else {
                        $magick = Get-ChildItem "C:\Program Files" -Directory |
                          Where-Object { $_.Name -like "ImageMagick*" } |
                          Select-Object -First 1

                        if ($magick) {
                          & "$($magick.FullName)\magick.exe" -version
                          $env:Path += ";$($magick.FullName)"
                        } else {
                          throw "ImageMagick installation failed or magick.exe could not be found."
                        }
                      }
                    }

            -   name: Initialize MSVC
                uses: ilammy/msvc-dev-cmd@v1

            -   name: Verify Toolchain
                shell: pwsh
                run: |
                    cmake --version
                    cl
                    & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest

            -   name: Configure CMake
                run: |
                    cmake -S cpp/windows -B cpp/windows/build -G "Visual Studio 17 2022" -A x64

            -   name: Build Native C++
                run: |
                    cmake --build cpp/windows/build --config Release

            -   name: Run Native Tests
                shell: pwsh
                run: |
                    ctest --test-dir cpp/windows/build -C Release --output-on-failure

            -   name: Build & Package Desktop App
                shell: pwsh
                run: |
                    .\gradlew.bat :desktopApp:assemble :desktopApp:packageDistributionForCurrentOS --stacktrace --no-parallel
