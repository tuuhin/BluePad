name: Build and Test Windows Pipeline

on:
    release:
        types: [ created ]
    workflow_dispatch:

jobs:
    build-windows:
        name: Build & Test Windows Target
        runs-on: windows-2022

        env:
            CI: "true"
            NATIVE_BUILD_TYPE_RELEASE: "true"

        steps:
            -   name: Checkout Code
                uses: actions/checkout@v4

            -   name: Setup Java
                uses: actions/setup-java@v4
                with:
                    java-version: "22"
                    distribution: "liberica"
                    cache: gradle

            -   name: Install CMake 4.0.2
                uses: ssrobins/install-cmake@v1
                with:
                    version: 4.0.2

            -   name: Verify CMake
                run: cmake --version

            -   name: Ensure ImageMagick is Installed
                shell: pwsh
                run: |
                    if (Get-Command magick -ErrorAction SilentlyContinue) {
                      Write-Host "ImageMagick is already installed."
                      magick -version
                    } else {
                      Write-Host "ImageMagick not found. Installing..."
                      choco install imagemagick -y

                      $magickDir = Get-ChildItem "C:\Program Files" -Directory |
                        Where-Object { $_.Name -like "ImageMagick*" } |
                        Select-Object -First 1

                      if ($magickDir) {
                        $env:Path += ";$($magickDir.FullName)"
                        & "$($magickDir.FullName)\magick.exe" -version
                      } else {
                        throw "ImageMagick installation failed."
                      }
                    }

            -   name: Initialize MSVC Environment
                uses: ilammy/msvc-dev-cmd@v1

            -   name: Verify MSVC
                shell: pwsh
                run: |
                    cl
                    & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest

            -   name: Configure CMake
                run: |
                    cmake -S cpp/windows -B cpp/windows/build -G "Visual Studio 17 2022" -A x64

            -   name: Build Native C++
                run: |
                    cmake --build cpp/windows/build --config Release

            -   name: Run Native Tests
                shell: pwsh
                run: |
                    ctest --test-dir cpp/windows/build -C Release --output-on-failure

            -   name: Build & Package Desktop App
                shell: pwsh
                run: |
                    .\gradlew.bat :desktopApp:assemble :desktopApp:packageDistributionForCurrentOS --stacktrace --no-parallel
